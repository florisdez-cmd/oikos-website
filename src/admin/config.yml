# =====================================================
# DECAP CMS CONFIGURATIE – Oikos Bouwend Bureau
# =====================================================

backend:
  name: git-gateway
  branch: main

# Waar worden media-bestanden (foto's) opgeslagen
media_folder: "src/assets/uploads"
public_folder: "/assets/uploads"

# =====================================================
# COLLECTIES – wat de klant kan bewerken
# =====================================================
collections:

  # --- NIEUWSBERICHTEN (klant kan zelf aanmaken / bewerken) ---
  - name: "posts"
    label: "Nieuwsberichten"
    label_singular: "Nieuwsbericht"
    folder: "src/posts"
    create: true
    slug: "{{slug}}"
    preview_path: "nieuws/{{slug}}"
    fields:
      - label: "Titel"
        name: "title"
        widget: "string"
        hint: "De titel van het bericht"

      - label: "Publicatiedatum"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "DD-MM-YYYY"
        time_format: false
        default: ""

      - label: "Uitgelichte afbeelding"
        name: "image"
        widget: "image"
        required: false
        hint: "Aanbevolen formaat: 1200×675px (16:9)"

      - label: "Korte samenvatting"
        name: "excerpt"
        widget: "text"
        required: false
        hint: "Wordt getoond als preview-tekst op de homepage en het nieuwsoverzicht (max. ~150 tekens)"

      - label: "Inhoud"
        name: "body"
        widget: "markdown"
        hint: "De volledige tekst van het bericht. Gebruik ## voor tussenkopjes."

      - label: "Locatie op kaart"
        name: "map_url"
        widget: "string"
        required: false
        hint: "Plak hier een Google Maps embed-link. Ga naar maps.google.com → zoek adres → Delen → Kaart insluiten → kopieer de src-link (begint met https://www.google.com/maps/embed?...)"

      - label: "Locatienaam"
        name: "map_label"
        widget: "string"
        required: false
        hint: "Bijv. 'Den Haag, Archipelbuurt' — wordt onder de kaart getoond"

      - label: "Bronnen"
        name: "bronnen"
        widget: "list"
        required: false
        hint: "Voeg bronnen toe die onderaan het bericht worden getoond. Verwijs in je tekst naar [1], [2] etc."
        fields:
          - label: "Nummer"
            name: "nr"
            widget: "number"
            value_type: "int"
          - label: "Omschrijving / titel"
            name: "titel"
            widget: "string"
          - label: "URL (optioneel)"
            name: "url"
            widget: "string"
            required: false
